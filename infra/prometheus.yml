global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "worker"
    static_configs:
      - targets: ["host.docker.internal:9000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
