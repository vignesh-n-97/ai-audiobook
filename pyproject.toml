[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["runs/", "artifacts/", "datasets/", ".venv/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["B008"]   # FastAPI Depends() in defaults is idiomatic — not a real issue

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["runs/", "artifacts/", "datasets/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
